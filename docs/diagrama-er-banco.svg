<svg width="1800" height="1280" viewBox="0 0 1800 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08151A"/>
      <stop offset="1" stop-color="#0F2830"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#163A44"/>
      <stop offset="1" stop-color="#102C34"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#031116" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowPhysical" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#7DD3FC"/>
    </marker>
    <marker id="arrowLogical" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#5EEAD4"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #F4FBFC; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #B7CDD2; }
      .group { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #D8F2F4; letter-spacing: 1px; }
      .tableTitle { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #092E36; }
      .tableText { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #D9EEF1; }
      .label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #CFE7EA; }
      .note { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #A5C7CC; }
      .physical { stroke: #7DD3FC; stroke-width: 4; marker-end: url(#arrowPhysical); }
      .logical { stroke: #5EEAD4; stroke-width: 3; stroke-dasharray: 12 8; marker-end: url(#arrowLogical); }
      .badge { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #04252B; }
    </style>
  </defs>

  <rect width="1800" height="1280" fill="url(#bg)"/>
  <text x="70" y="80" class="title">Diagrama ER do Banco Operacional</text>
  <text x="70" y="112" class="subtitle">Relacionamentos fisicos e logicos usados hoje pela API</text>

  <!-- group labels -->
  <text x="80" y="170" class="group">ACESSO E TERRITORIO</text>
  <text x="80" y="470" class="group">OPERACAO DE CAMPO</text>
  <text x="780" y="470" class="group">NUCLEO ASSISTENCIAL</text>
  <text x="80" y="900" class="group">SUPORTE E AUDITORIA</text>

  <!-- usuarios -->
  <g transform="translate(70 190)" filter="url(#shadow)">
    <rect width="280" height="198" rx="22" fill="url(#panel)"/>
    <rect width="280" height="46" rx="22" fill="url(#head)"/>
    <rect y="22" width="280" height="24" fill="url(#head)"/>
    <text x="22" y="30" class="tableTitle">usuarios</text>
    <text x="20" y="70" class="tableText">PK id_usuario</text>
    <text x="20" y="92" class="tableText">nome</text>
    <text x="20" y="114" class="tableText">perfil</text>
    <text x="20" y="136" class="tableText">UK identificador_login</text>
    <text x="20" y="158" class="tableText">territorio</text>
    <text x="20" y="180" class="tableText">ativo</text>
  </g>

  <!-- comunidades -->
  <g transform="translate(420 190)" filter="url(#shadow)">
    <rect width="280" height="176" rx="22" fill="url(#panel)"/>
    <rect width="280" height="46" rx="22" fill="url(#head)"/>
    <rect y="22" width="280" height="24" fill="url(#head)"/>
    <text x="22" y="30" class="tableTitle">comunidades</text>
    <text x="20" y="70" class="tableText">PK id_comunidade</text>
    <text x="20" y="92" class="tableText">municipio_comunidade</text>
    <text x="20" y="114" class="tableText">territorio</text>
  </g>

  <!-- pesquisadores -->
  <g transform="translate(770 190)" filter="url(#shadow)">
    <rect width="260" height="176" rx="22" fill="url(#panel)"/>
    <rect width="260" height="46" rx="22" fill="url(#head)"/>
    <rect y="22" width="260" height="24" fill="url(#head)"/>
    <text x="22" y="30" class="tableTitle">pesquisadores</text>
    <text x="20" y="70" class="tableText">PK id_pesquisador</text>
    <text x="20" y="92" class="tableText">nome</text>
    <text x="20" y="114" class="tableText">instituicao</text>
  </g>

  <!-- registros mercuario -->
  <g transform="translate(1100 190)" filter="url(#shadow)">
    <rect width="300" height="198" rx="22" fill="url(#panel)"/>
    <rect width="300" height="46" rx="22" fill="url(#head)"/>
    <rect y="22" width="300" height="24" fill="url(#head)"/>
    <text x="22" y="30" class="tableTitle">registros_mercuario</text>
    <text x="20" y="70" class="tableText">PK id_registo</text>
    <text x="20" y="92" class="tableText">comunidade</text>
    <text x="20" y="114" class="tableText">tipo_amostra</text>
    <text x="20" y="136" class="tableText">risco</text>
  </g>

  <!-- field_collections -->
  <g transform="translate(70 490)" filter="url(#shadow)">
    <rect width="440" height="322" rx="22" fill="url(#panel)"/>
    <rect width="440" height="46" rx="22" fill="url(#head)"/>
    <rect y="22" width="440" height="24" fill="url(#head)"/>
    <text x="22" y="30" class="tableTitle">field_collections</text>
    <text x="20" y="70" class="tableText">PK id_coleta</text>
    <text x="20" y="92" class="tableText">UK external_id</text>
    <text x="20" y="114" class="tableText">community</text>
    <text x="20" y="136" class="tableText">sample_type</text>
    <text x="20" y="158" class="tableText">protocol_id</text>
    <text x="20" y="180" class="tableText">protocol_title</text>
    <text x="20" y="202" class="tableText">article_refs_json</text>
    <text x="20" y="224" class="tableText">required_fields_json</text>
    <text x="20" y="246" class="tableText">collector_user_id</text>
    <text x="20" y="268" class="tableText">collector_name</text>
    <text x="20" y="290" class="tableText">sample_status, risk</text>
  </g>

  <!-- clinical_patient_cases -->
  <g transform="translate(780 490)" filter="url(#shadow)">
    <rect width="420" height="322" rx="22" fill="url(#panel)"/>
    <rect width="420" height="46" rx="22" fill="url(#head)"/>
    <rect y="22" width="420" height="24" fill="url(#head)"/>
    <text x="22" y="30" class="tableTitle">clinical_patient_cases</text>
    <text x="20" y="70" class="tableText">PK id_caso</text>
    <text x="20" y="92" class="tableText">patient_name</text>
    <text x="20" y="114" class="tableText">community</text>
    <text x="20" y="136" class="tableText">risk_label</text>
    <text x="20" y="158" class="tableText">case_status</text>
    <text x="20" y="180" class="tableText">next_step</text>
    <text x="20" y="202" class="tableText">priority_group</text>
    <text x="20" y="224" class="tableText">symptoms</text>
    <text x="20" y="246" class="tableText">exposure_summary</text>
    <text x="20" y="268" class="tableText">clinical_note</text>
    <text x="20" y="290" class="tableText">return_at, last_action</text>
  </g>

  <!-- clinical_case_actions -->
  <g transform="translate(1270 490)" filter="url(#shadow)">
    <rect width="360" height="278" rx="22" fill="url(#panel)"/>
    <rect width="360" height="46" rx="22" fill="url(#head)"/>
    <rect y="22" width="360" height="24" fill="url(#head)"/>
    <text x="22" y="30" class="tableTitle">clinical_case_actions</text>
    <text x="20" y="70" class="tableText">PK id_acao</text>
    <text x="20" y="92" class="tableText">FK case_id</text>
    <text x="20" y="114" class="tableText">doctor_user_id</text>
    <text x="20" y="136" class="tableText">action_type</text>
    <text x="20" y="158" class="tableText">note</text>
    <text x="20" y="180" class="tableText">return_at</text>
    <text x="20" y="202" class="tableText">next_status</text>
    <text x="20" y="224" class="tableText">next_step</text>
  </g>

  <!-- support_requests -->
  <g transform="translate(70 930)" filter="url(#shadow)">
    <rect width="350" height="242" rx="22" fill="url(#panel)"/>
    <rect width="350" height="46" rx="22" fill="url(#head)"/>
    <rect y="22" width="350" height="24" fill="url(#head)"/>
    <text x="22" y="30" class="tableTitle">support_requests</text>
    <text x="20" y="70" class="tableText">PK id_solicitacao</text>
    <text x="20" y="92" class="tableText">UK protocol</text>
    <text x="20" y="114" class="tableText">selected_role</text>
    <text x="20" y="136" class="tableText">requester_name</text>
    <text x="20" y="158" class="tableText">contact_info</text>
    <text x="20" y="180" class="tableText">message</text>
    <text x="20" y="202" class="tableText">request_status</text>
  </g>

  <!-- admin_change_log -->
  <g transform="translate(520 930)" filter="url(#shadow)">
    <rect width="360" height="242" rx="22" fill="url(#panel)"/>
    <rect width="360" height="46" rx="22" fill="url(#head)"/>
    <rect y="22" width="360" height="24" fill="url(#head)"/>
    <text x="22" y="30" class="tableTitle">admin_change_log</text>
    <text x="20" y="70" class="tableText">PK id_evento</text>
    <text x="20" y="92" class="tableText">table_name</text>
    <text x="20" y="114" class="tableText">action_type</text>
    <text x="20" y="136" class="tableText">record_id</text>
    <text x="20" y="158" class="tableText">summary</text>
    <text x="20" y="180" class="tableText">changed_at</text>
  </g>

  <!-- system_migrations -->
  <g transform="translate(980 930)" filter="url(#shadow)">
    <rect width="280" height="154" rx="22" fill="url(#panel)"/>
    <rect width="280" height="46" rx="22" fill="url(#head)"/>
    <rect y="22" width="280" height="24" fill="url(#head)"/>
    <text x="22" y="30" class="tableTitle">system_migrations</text>
    <text x="20" y="70" class="tableText">PK migration_key</text>
    <text x="20" y="92" class="tableText">applied_at</text>
  </g>

  <!-- legend -->
  <g transform="translate(1370 930)">
    <text x="0" y="0" class="group">LEGENDA</text>
    <line x1="0" y1="32" x2="120" y2="32" class="physical"/>
    <text x="140" y="36" class="note">FK real no MySQL</text>
    <line x1="0" y1="74" x2="120" y2="74" class="logical"/>
    <text x="140" y="78" class="note">relacao logica da aplicacao</text>
    <rect x="0" y="108" width="104" height="26" rx="13" fill="#7DD3FC"/>
    <text x="20" y="125" class="badge">1 : N</text>
    <text x="122" y="126" class="note">cardinalidade predominante</text>
  </g>

  <!-- physical relationship -->
  <line x1="1200" y1="628" x2="1270" y2="628" class="physical"/>
  <rect x="1214" y="595" width="72" height="24" rx="12" fill="#7DD3FC"/>
  <text x="1232" y="611" class="badge">1 : N</text>
  <text x="1185" y="662" class="note">case_id</text>

  <!-- logical relationships -->
  <line x1="250" y1="388" x2="250" y2="490" class="logical"/>
  <rect x="212" y="430" width="78" height="24" rx="12" fill="#5EEAD4"/>
  <text x="230" y="446" class="badge">1 : N</text>
  <text x="108" y="448" class="note">coletor</text>

  <line x1="560" y1="366" x2="390" y2="490" class="logical"/>
  <rect x="445" y="410" width="78" height="24" rx="12" fill="#5EEAD4"/>
  <text x="463" y="426" class="badge">1 : N</text>
  <text x="408" y="452" class="note">community</text>

  <line x1="560" y1="366" x2="890" y2="490" class="logical"/>
  <rect x="674" y="404" width="78" height="24" rx="12" fill="#5EEAD4"/>
  <text x="692" y="420" class="badge">1 : N</text>
  <text x="694" y="452" class="note">community</text>

  <line x1="250" y1="388" x2="1310" y2="540" class="logical"/>
  <rect x="820" y="432" width="78" height="24" rx="12" fill="#5EEAD4"/>
  <text x="838" y="448" class="badge">1 : N</text>
  <text x="789" y="478" class="note">doctor_user_id</text>

  <line x1="700" y1="278" x2="1100" y2="278" class="logical"/>
  <rect x="812" y="246" width="78" height="24" rx="12" fill="#5EEAD4"/>
  <text x="830" y="262" class="badge">1 : N</text>
  <text x="824" y="300" class="note">comunidade</text>

  <!-- audit logical links -->
  <line x1="700" y1="930" x2="250" y2="388" class="logical"/>
  <line x1="710" y1="930" x2="560" y2="366" class="logical"/>
  <line x1="730" y1="930" x2="900" y2="366" class="logical"/>
  <line x1="760" y1="930" x2="1220" y2="388" class="logical"/>
  <text x="598" y="894" class="note">audita tabelas centrais</text>

  <text x="70" y="1238" class="note">Observacao: o ER atual mostra uma base funcional, mas parcialmente desnormalizada. O proximo passo tecnico mais importante e transformar ligacoes textuais em FOREIGN KEY reais, principalmente entre field_collections, clinical_* e as tabelas usuarios/comunidades.</text>
</svg>
